<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop-It{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{{ url_for('main.home') }}">
                Shop-It 
                <span class="badge bg-warning text-dark ms-2">Prototype</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.home' %}active{% endif %}" href="{{ url_for('main.home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.scan' %}active{% endif %}" href="{{ url_for('main.scan') }}">Scan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.usage' %}active{% endif %}" href="{{ url_for('main.usage') }}">Usage</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
    <!-- Footer -->
    <footer class="bg-white border-top mt-5 py-3">
        <div class="container text-center">
            <a href="mailto:waribekihiko651@gmail.com" class="text-decoration-none mx-2" title="Email">
                <i class="bi bi-envelope-fill fs-4 text-black"></i>
            </a>
            <a href="https://github.com/Samboja651" class="text-decoration-none mx-2" target="_blank" rel="noopener" title="GitHub">
                <i class="bi bi-github fs-4 text-black"></i>
            </a>
            <a href="https://www.linkedin.com/in/grantonwaribe" class="text-decoration-none mx-2" target="_blank" rel="noopener" title="LinkedIn">
                <i class="bi bi-linkedin fs-4 text-black"></i>
            </a>
        </div>
        <div class="text-secondary small">
            &copy; 2025 Shop-It &mdash; 
            <a href="https://opensource.org/licenses/MIT" class="text-primary text-decoration-underline" target="_blank" rel="noopener">MIT License</a>
        </div>
    </footer>     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
