<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-it</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- html5-qrscanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #scanner-container {
            display: none;
            margin-top: 20px;
        }

        #item-display {
            display: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4 text-primary">Scan QRCode</h1>
        <button class="btn btn-success mb-3" onclick="startScanner()">Start Scan</button>

        <div id="scanner-container" class="mb-3">
            <div id="reader" style="width: 100%; max-width: 600px;"></div>
            <button class="btn btn-danger mt-2" onclick="stopScanner()">Stop Scan</button>
        </div>

        <!-- Scan result shown here -->
        <div id="scan-result" class="alert alert-info d-none" role="alert"></div>

        <!-- Item display layout -->
        <div id="item-display" class="card shadow-sm mt-4">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-6">
                        <h5 class="card-title">Item Name</h5>
                        <p id="item-name" class="card-text fw-bold"></p>
                    </div>
                    <div class="col-6">
                        <h5 class="card-title">Price</h5>
                        <p id="item-price" class="card-text fw-bold text-success"></p>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <h6>Total</h6>
                        <p id="item-total" class="fw-bold"></p>
                    </div>
                    <div class="col-6 d-flex align-items-end justify-content-end gap-2">
                        <button class="btn btn-primary" id="proceed-btn" disabled>Proceed</button>
                        <button class="btn btn-outline-secondary" id="clear-btn" style="display: none;">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Phone number entry card (hidden by default) -->
        <div id="phone-entry-card" class="card shadow-sm mt-4" style="display: none;">
            <div class="card-body">
                <h5 class="card-title mb-3">Enter Phone number: for payment</h5>
                <input type="text" id="phone-number" class="form-control mb-3" placeholder="254712345678">
                <div class="d-flex justify-content-between">
                    <button class="btn btn-secondary" id="back-btn">Back</button>
                    <button class="btn btn-success" id="ok-btn">OK</button>
                </div>
            </div>
        </div>

        <!-- Error display -->
        <div id="item-error" class="alert alert-danger d-none mt-4" role="alert"></div>
    </div>

    <script>
        let html5QrCode;

        function startScanner() {
            document.getElementById("scanner-container").style.display = "block";
            document.getElementById("scan-result").classList.add("d-none");
            document.getElementById("item-display").style.display = "none";
            document.getElementById("item-error").classList.add("d-none");

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: 250
                },
                (decodedText, decodedResult) => {
                    showScanResult(decodedText);
                    fetchItemDetails(decodedText);
                    stopScanner();
                },
                (errorMessage) => {
                    console.warn("QR Code scan error: ", errorMessage);
                }
            ).catch(err => {
                console.error("Scan failed", err);
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById("scanner-container").style.display = "none";
                });
            }
        }

        function showScanResult(text) {
            const resultDiv = document.getElementById("scan-result");
            resultDiv.textContent = "Scan result: " + text;
            resultDiv.classList.remove("d-none");
        }

        function fetchItemDetails(barcode) {
            fetch(`/inventory/get-item/${barcode}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showItemError(data.error);
                        return;
                    }
                    showItemDisplay(data);
                })
                .catch(err => {
                    showItemError("Failed to fetch item details.");
                });
        }

        function showItemDisplay(item) {
            document.getElementById("item-name").textContent = item.name;
            document.getElementById("item-price").textContent = "Ksh " + item.price;
            document.getElementById("item-total").textContent = "Ksh " + item.price;
            document.getElementById("item-display").style.display = "block";
            document.getElementById("proceed-btn").disabled = false;
            document.getElementById("item-error").classList.add("d-none");
            document.getElementById("clear-btn").style.display = "inline-block"; // Show clear button
        }

        // Hide item display and scan result when clear is clicked
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("clear-btn").addEventListener("click", function () {
                document.getElementById("item-display").style.display = "none";
                document.getElementById("scan-result").classList.add("d-none");
                document.getElementById("clear-btn").style.display = "none";
                document.getElementById("item-error").classList.add("d-none");
            });
        });

        function showItemError(message) {
            const errorDiv = document.getElementById("item-error");
            errorDiv.textContent = message;
            errorDiv.classList.remove("d-none");
            document.getElementById("item-display").style.display = "none";
            document.getElementById("clear-btn").style.display = "none"; // Hide clear button on error
        }

        // Show phone entry card, hide item display
        document.getElementById("proceed-btn").addEventListener("click", function () {
            document.getElementById("item-display").style.display = "none";
            document.getElementById("phone-entry-card").style.display = "block";
        });

        // Back button: show item display, hide phone entry
        document.getElementById("back-btn").addEventListener("click", function () {
            document.getElementById("phone-entry-card").style.display = "none";
            document.getElementById("item-display").style.display = "block";
        });

        // Optionally, handle OK button click here
    </script>
    <!-- Bootstrap JS (optional, for some components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
