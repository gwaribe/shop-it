<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-it</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- html5-qrscanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #scanner-container {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4 text-primary">Scan QRCode</h1>
        <button class="btn btn-success mb-3" onclick="startScanner()">Start Scan</button>

        <div id="scanner-container" class="mb-3">
            <div id="reader" style="width: 100%; max-width: 600px;"></div>
            <button class="btn btn-danger mt-2" onclick="stopScanner()">Stop Scan</button>
        </div>

        <!-- Scan result shown here -->
        <div id="scan-result" class="alert alert-info d-none" role="alert"></div>
    </div>

    <script>
        let html5QrCode;

        function startScanner() {
            document.getElementById("scanner-container").style.display = "block";
            document.getElementById("scan-result").classList.add("d-none");

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: 250
                },
                (decodedText, decodedResult) => {
                    showScanResult(decodedText);
                    stopScanner();
                },
                (errorMessage) => {
                    // Ignore scan errors
                }
            ).catch(err => {
                console.error("Scan failed", err);
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById("scanner-container").style.display = "none";
                });
            }
        }

        function showScanResult(text) {
            const resultDiv = document.getElementById("scan-result");
            resultDiv.textContent = "Scanned: " + text;
            resultDiv.classList.remove("d-none");
        }
    </script>
    <!-- Bootstrap JS (optional, for some components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
